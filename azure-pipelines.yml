trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  NodeVersion: "20.x"

steps:
  - task: NodeTool@0
    displayName: Use Node.js $(NodeVersion)
    inputs:
      versionSpec: $(NodeVersion)

  - script: npm ci
    displayName: Install dependencies

  - script: npm run build
    displayName: Build project

  - script: npm prune --omit=dev
    displayName: Prune dev dependencies

  - task: ArchiveFiles@2
    displayName: Archive Azure Functions package
    inputs:
      rootFolderOrFile: $(System.DefaultWorkingDirectory)
      includeRootFolder: false
      archiveType: zip
      archiveFile: $(Build.ArtifactStagingDirectory)/peoplesafe-mcp.zip
      replaceExistingArchive: true

  - publish: $(Build.ArtifactStagingDirectory)/peoplesafe-mcp.zip
    artifact: peoplesafe-mcp-package
